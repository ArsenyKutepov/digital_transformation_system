<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Цифровая трансформация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container { max-width: 460px; width: 100%; padding: 20px; }
        .register-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #1E293B; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #3B82F6; }
        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-link { text-align: center; margin-top: 24px; font-size: 14px; }
        .login-link a { color: #3B82F6; text-decoration: none; }
        .error { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>

            {% if error %}
            <div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Логин *</label>
                    <input type="text" name="username" placeholder="Придумайте логин" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Полное имя</label>
                    <input type="text" name="full_name" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль *</label>
                    <input type="password" name="password" placeholder="Минимум 6 символов" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Подтверждение пароля *</label>
                    <input type="password" name="confirm_password" placeholder="Повторите пароль" required>
                </div>
                <button type="submit" class="btn-register">Зарегистрироваться</button>
            </form>

            <div class="login-link">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
